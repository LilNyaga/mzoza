<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Not found — TRACE Sewing</title>
    <script>
      // If deployed to a static host without rewrite support (GitHub Pages),
      // redirect to index.html so the SPA can handle the route via client-side routing.
      try {
        var path = location.pathname + location.search + location.hash;
        // Replace with a hash route so BrowserRouter doesn't need server rewrites.
        // This keeps the original path after redirecting to index.html
        location.replace('/#' + path);
      } catch (e) {
        location.replace('/');
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
